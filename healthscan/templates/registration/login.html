{% extends 'healthscan/base.html' %}

{% block content %}
<div class="container">
  <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
      <div class="text-center mb-4">
        <i class="fa-solid fa-circle-user text-primary" style="font-size: 4rem;"></i>
        <h2 class="mt-3 fw-extrabold text-primary">Access Baymax HealthScan</h2>
        <p class="text-muted">Sign in to check your personalized health analysis</p>
      </div>
      
      <div class="glass-card p-4 p-md-5">
        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          
          {% if form.errors %}
            <div class="alert alert-danger border-0 bg-danger-subtle text-danger py-2 rounded-3 mb-3">
              <i class="fa-solid fa-triangle-exclamation me-2"></i>
              Incorrect username or password. Please try again.
            </div>
          {% endif %}
          
          <div class="mb-3">
            <label for="id_username" class="form-label fw-bold">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0 border-primary-subtle"><i class="fa-solid fa-user text-secondary"></i></span>
              <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control border-start-0 border-primary-subtle" placeholder="Enter username">
            </div>
          </div>
          
          <div class="mb-4">
            <label for="id_password" class="form-label fw-bold">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0 border-primary-subtle"><i class="fa-solid fa-lock text-secondary"></i></span>
              <input type="password" name="password" required id="id_password" class="form-control border-start-0 border-primary-subtle" placeholder="Enter password">
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold mb-3">
            Sign In
          </button>
          
          <div class="text-center mt-3">
            <span class="text-muted">Don't have an account?</span>
            <a href="{% url 'register' %}" class="fw-bold text-decoration-none ms-1">Create Account</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
